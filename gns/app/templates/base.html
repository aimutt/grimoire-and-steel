<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Grimoire &amp; Steel — Rules &amp; Content{% endblock %}</title>
  <style>
    :root { --ink:#211a30; --paper:#f3eef7; --accent:#4a2a7a; --accent2:#7a1f12; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Georgia, "Times New Roman", serif;
           background: var(--paper); color: var(--ink); line-height:1.5; }
    header { background: var(--accent); color:#f3eef7; padding:.8rem 1.2rem;
             display:flex; flex-wrap:wrap; align-items:center; gap:.2rem 1.1rem; }
    header a { color:#f3eef7; text-decoration:none; }
    header a:hover { text-decoration:underline; }
    header .brand { font-weight:bold; font-size:1.15rem; margin-right:.4rem; }
    header form.nav-search { margin-left:auto; }
    header form.nav-search input { padding:.32rem .55rem; border:none; border-radius:4px;
             font-size:.92rem; min-width:180px; }
    main { max-width: 940px; margin: 1.4rem auto; padding: 0 1.2rem; }
    h1,h2 { font-variant: small-caps; letter-spacing:.5px; color:var(--accent); }
    .muted { color:#6b6080; }
    .desc { color:#3a3350; }
    .cards { display:flex; flex-wrap:wrap; gap:.6rem; margin:1rem 0; }
    .cards a { display:inline-block; padding:.5rem .9rem; background:#fff; color:var(--accent);
               border:1px solid #cdbfe6; border-radius:6px; text-decoration:none; font-weight:bold; }
    .cards a:hover { background:#ece3f6; }
    ol.sections { columns:2; gap:2rem; padding-left:1.2rem; }
    ol.sections a { color:var(--accent); text-decoration:none; }
    ol.sections a:hover { text-decoration:underline; }
    table.grid { width:100%; border-collapse:collapse; }
    table.grid th, table.grid td { text-align:left; padding:.45rem .6rem;
               border-bottom:1px solid #ddd3ea; vertical-align:top; }
    table.grid th { font-variant:small-caps; color:#5b5070; }
    table.grid a { color:var(--accent); font-weight:bold; text-decoration:none; }
    article.section { background:#fbf9fe; border:1px solid #ddd0ee; border-radius:6px;
               padding:1rem 1.4rem; }
    article.section table { border-collapse:collapse; margin:.6rem 0; }
    article.section th, article.section td { border:1px solid #cdbfe6; padding:.35rem .6rem; }
    article.section th { background:#ece3f6; }
    article.section code { background:#efe7fa; padding:.05rem .3rem; border-radius:3px; }
    pre.book { white-space:pre-wrap; font-family: Consolas, monospace; font-size:.95rem;
               background:#fbf9fe; border:1px solid #ddd0ee; padding:1rem; border-radius:6px; }
    .result { padding:.6rem 0; border-bottom:1px solid #ddd3ea; }
    .result .cat { display:inline-block; font-size:.7rem; padding:.1rem .45rem; border-radius:10px;
               background:#8a7c9c; color:#fff; vertical-align:middle; margin-right:.4rem; }
    .result mark { background:#ffe79a; }
    a.back { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('index') }}">Grimoire &amp; Steel</a>
    <a href="{{ url_for('content_monsters') }}">Monsters</a>
    <a href="{{ url_for('content_spells') }}">Spells</a>
    <a href="{{ url_for('content_callings') }}">Callings</a>
    <a href="{{ url_for('content_kin') }}">Kin</a>
    <a href="{{ url_for('content_advancement') }}">Advancement</a>
    <form class="nav-search" method="get" action="{{ url_for('search') }}">
      <input type="text" name="q" placeholder="Search rules…" value="{{ q or '' }}">
    </form>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
